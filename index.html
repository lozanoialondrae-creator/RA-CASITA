<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RA Casita</title>

  <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@gh-pages/examples/js/remix-dropdown.js"></script>
</head>

<body>
  <a-scene>
    <a-assets>
      <a-asset-item id="modelo" src="Depa Alo.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 1.6 3"></a-camera>

    <a-entity
      gltf-model="#modelo"
      position="0 0 -3"
      scale="1 1 1">
    </a-entity>
  </a-scene>
</body>
</html>
